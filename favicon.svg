<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0f0a"/>
  <!-- Circuit traces -->
  <line x1="15" y1="50" x2="30" y2="50" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="50" x2="85" y2="50" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="50" y2="30" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="70" x2="50" y2="85" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Corner traces -->
  <line x1="25" y1="25" x2="34" y2="34" stroke="#00cc33" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="75" y1="25" x2="66" y2="34" stroke="#00cc33" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25" y1="75" x2="34" y2="66" stroke="#00cc33" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="75" y1="75" x2="66" y2="66" stroke="#00cc33" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Corner pads -->
  <circle cx="15" cy="50" r="3.5" fill="#00ff41"/>
  <circle cx="85" cy="50" r="3.5" fill="#00ff41"/>
  <circle cx="50" cy="15" r="3.5" fill="#00ff41"/>
  <circle cx="50" cy="85" r="3.5" fill="#00ff41"/>
  <circle cx="25" cy="25" r="3" fill="#00ff41"/>
  <circle cx="75" cy="25" r="3" fill="#00ff41"/>
  <circle cx="25" cy="75" r="3" fill="#00ff41"/>
  <circle cx="75" cy="75" r="3" fill="#00ff41"/>
  <!-- Shield -->
  <polygon points="50,28 66,37 66,56 50,65 34,56 34,37" fill="#003d00" stroke="#00ff41" stroke-width="2.2"/>
  <!-- Lock body -->
  <rect x="43" y="47" width="14" height="11" rx="2.5" fill="#00ff41"/>
  <!-- Lock shackle -->
  <path d="M45.5 47 L45.5 42.5 Q50 38 54.5 42.5 L54.5 47" fill="none" stroke="#00ff41" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="50" cy="51.5" r="2.2" fill="#0a0f0a"/>
  <rect x="49" y="51.5" width="2" height="3.5" fill="#0a0f0a"/>
</svg>
